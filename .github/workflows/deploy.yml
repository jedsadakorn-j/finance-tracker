name: Deploy to Cloudflare

# Auto-deploy the Worker on every push to main.
# Requires two GitHub repository secrets:
#   - CLOUDFLARE_API_TOKEN   (token with "Edit Cloudflare Workers" permission)
#   - CLOUDFLARE_ACCOUNT_ID  (your Cloudflare account id)
# Worker secrets (ADMIN_PASSWORD, SESSION_SECRET) persist on Cloudflare across
# deploys, so they are NOT needed here. D1 migrations are applied manually.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy with Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
